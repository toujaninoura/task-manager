<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow" style="width: 400px;">
    <div class="card-body p-4">
      <h4 class="card-title text-center mb-4">{{ isLoginMode ? 'Connexion' : 'Inscription' }}</h4>

      <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
            formControlName="email">
          <div class="invalid-feedback">Email invalide</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Mot de passe</label>
          <input
            type="password"
            class="form-control"
            [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
            formControlName="password">
          <div class="invalid-feedback">Minimum 8 caractères</div>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          {{ isLoginMode ? 'Se connecter' : "S'inscrire" }}
        </button>
      </form>

      <hr>
      <p class="text-center mb-0">
        {{ isLoginMode ? 'Pas de compte ?' : 'Déjà inscrit ?' }}
        <a href="#" (click)="$event.preventDefault(); toggle()">
          {{ isLoginMode ? "S'inscrire" : 'Se connecter' }}
        </a>
      </p>
    </div>
  </div>
</div>
